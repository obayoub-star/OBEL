<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedicaTronic – Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }
        .logo-block {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-name {
            font-size: 2rem;
            font-weight: 900;
            color: #1e293b;
            letter-spacing: -1px;
        }
        .logo-sub { font-size: 0.82rem; color: #64748b; margin-top: 2px; }
        .form-label { font-size: 0.82rem; font-weight: 700; color: #475569; }
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.92rem;
            transition: border-color .15s;
        }
        .form-control:focus { border-color: #0dcaf0; box-shadow: 0 0 0 3px rgba(13,202,240,.15); }
        .btn-login {
            background: linear-gradient(135deg, #0dcaf0, #0284c7);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            transition: opacity .15s;
        }
        .btn-login:hover { opacity: 0.9; color: white; }
        .error-box {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .role-info {
            background: #f8fafc;
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 20px;
            font-size: 0.78rem;
            color: #64748b;
        }
        .role-info .role-row { display: flex; justify-content: space-between; padding: 3px 0; }
        .role-info .role-row .badge-role {
            background: #e0f2fe; color: #0284c7;
            border-radius: 4px; padding: 2px 8px; font-weight: 700;
        }
        .role-info .role-row .badge-emp {
            background: #dcfce7; color: #166534;
            border-radius: 4px; padding: 2px 8px; font-weight: 700;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo-block">
        <!-- MedicaTronic full logo -->
        <svg width="80" height="80" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:4px;">
            <!-- Blue outer C-arc -->
            <path d="M 36 8 A 18 18 0 1 0 36 36" fill="none" stroke="#1565c0" stroke-width="5.5" stroke-linecap="round"/>
            <!-- Green filled circle (right side) -->
            <circle cx="29" cy="22" r="11" fill="#5aab2a"/>
            <!-- White inner highlight -->
            <circle cx="26" cy="19" r="5" fill="white" opacity="0.28"/>
            <!-- Blue pupil/eye dot -->
            <circle cx="27" cy="21" r="4" fill="#1565c0"/>
            <!-- White glint -->
            <circle cx="25.5" cy="19.5" r="1.5" fill="white"/>
        </svg>
        <div class="logo-name">
            <span style="color:#1565c0;">Medica</span><span style="color:#5aab2a;">Tronic</span>
        </div>
        <div class="logo-sub">For medical devices</div>
    </div>

    {% if error %}
    <div class="error-box">
        <i class="fas fa-exclamation-circle me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" placeholder="admin"
                   autocomplete="username" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label">Mot de passe</label>
            <div class="position-relative">
                <input type="password" name="password" id="pwField" class="form-control"
                       placeholder="••••••••" autocomplete="current-password" required>
                <button type="button"
                        style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                               background:none; border:none; color:#94a3b8; cursor:pointer;"
                        onclick="togglePw()">
                    <i class="fas fa-eye" id="pwIcon"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt me-2"></i> Se connecter
        </button>
    </form>

    <div class="role-info mt-3">
        <div class="fw-bold mb-1" style="font-size:0.75rem; text-transform:uppercase; color:#94a3b8;">
            Accès de démonstration
        </div>
        <div class="role-row">
            <span><i class="fas fa-crown me-1" style="color:#eab308;"></i> admin / admin123</span>
            <span class="badge-role">Admin</span>
        </div>
        <div class="role-row">
            <span><i class="fas fa-user me-1" style="color:#22c55e;"></i> employe / emp123</span>
            <span class="badge-emp">Employé</span>
        </div>
    </div>
</div>

<script>
function togglePw() {
    var f = document.getElementById('pwField');
    var i = document.getElementById('pwIcon');
    if (f.type === 'password') { f.type = 'text';     i.className = 'fas fa-eye-slash'; }
    else                        { f.type = 'password'; i.className = 'fas fa-eye'; }
}
</script>
</body>
</html>
