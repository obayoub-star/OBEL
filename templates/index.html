<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedicaTronic – Tableau de bord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
{% include '_sidebar.html' %}

<div class="main-content">
    <!-- Top bar -->
    <div class="bg-white border-bottom px-4 py-3 d-flex justify-content-between align-items-center">
        <div>
            <h5 class="fw-bold mb-0 heading" style="font-size:1.15rem;">
                <i class="fas fa-grid-2 me-2" style="color:var(--primary); opacity:0.7;"></i>Tableau de bord
            </h5>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span class="badge" style="background:var(--primary-light); color:var(--primary); padding:6px 14px; font-size:0.76rem;">
                <i class="fas fa-circle" style="font-size:0.4rem; vertical-align:middle;"></i>
                En ligne
            </span>
            <small style="color:var(--text-tertiary); font-weight:500;">
                <i class="far fa-calendar me-1"></i>
                {{ now if now else '' }}
            </small>
        </div>
    </div>

    <div class="content-padding">

        <!-- KPI Cards with staggered animation -->
        <div class="row g-3 mb-4">
            <div class="col-md-3 col-sm-6 animate-in animate-in-delay-1">
                <a href="{{ url_for('producten') }}" class="text-decoration-none">
                    <div class="kpi-card">
                        <div class="kpi-icon blue"><i class="fas fa-box"></i></div>
                        <div>
                            <div class="kpi-value" data-count="{{ total_produits }}">0</div>
                            <div class="kpi-label">Total Produits</div>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-sm-6 animate-in animate-in-delay-2">
                <div class="kpi-card">
                    <div class="kpi-icon red"><i class="fas fa-exclamation-triangle"></i></div>
                    <div>
                        <div class="kpi-value text-danger" data-count="{{ stock_critique }}">0</div>
                        <div class="kpi-label">Stock Critique</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6 animate-in animate-in-delay-3">
                <a href="{{ url_for('ventes') }}" class="text-decoration-none">
                    <div class="kpi-card">
                        <div class="kpi-icon green"><i class="fas fa-file-invoice-dollar"></i></div>
                        <div>
                            <div class="kpi-value" data-count="{{ ventes_mois_ttc|int }}" data-suffix=" dh">0</div>
                            <div class="kpi-label">Ventes ce mois</div>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-sm-6 animate-in animate-in-delay-4">
                <div class="kpi-card">
                    <div class="kpi-icon yellow"><i class="fas fa-hospital"></i></div>
                    <div>
                        <div class="kpi-value" data-count="{{ nb_clients }}">0</div>
                        <div class="kpi-label">Clients actifs</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Row 1: Stock by manufacturer + Sales evolution -->
        <div class="row g-3 mb-3">
            <div class="col-lg-6 animate-in animate-in-delay-3">
                <div class="chart-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="chart-title"><i class="fas fa-warehouse me-2"></i>Stock par fabricant</div>
                        <select id="marqueFilter" class="form-select form-select-sm border-0"
                                style="width:auto; background:var(--bg); border-radius:var(--radius-full);"
                                onchange="loadStockParMarque()">
                            <option value="">Tous les fabricants</option>
                            {% for m in marques %}
                            <option value="{{ m.marque }}">{{ m.marque }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div style="height:260px;">
                        <canvas id="stockMarqueChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 animate-in animate-in-delay-4">
                <div class="chart-card">
                    <div class="chart-title"><i class="fas fa-chart-line me-2"></i>&Eacute;volution des ventes (12 mois)</div>
                    <div style="height:260px;">
                        <canvas id="evolutionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Row 2: Top sales + Top clients -->
        <div class="row g-3">
            <div class="col-lg-6 animate-in animate-in-delay-5">
                <div class="chart-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="chart-title"><i class="fas fa-trophy me-2"></i>Meilleures ventes</div>
                        <div class="btn-group btn-group-sm" role="group">
                            <button type="button" class="btn btn-info text-white active" id="btnMois"
                                    onclick="loadTopVentes('mois')" style="border-radius:var(--radius-full) 0 0 var(--radius-full); font-size:0.75rem;">Ce mois</button>
                            <button type="button" class="btn btn-outline-info" id="btnAnnee"
                                    onclick="loadTopVentes('annee')" style="border-radius:0 var(--radius-full) var(--radius-full) 0; font-size:0.75rem;">Cette ann&eacute;e</button>
                        </div>
                    </div>
                    <div style="height:260px;">
                        <canvas id="topVentesChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 animate-in animate-in-delay-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="fas fa-star me-2"></i>Meilleurs clients (CA total)</div>
                    <div style="height:260px;">
                        <canvas id="topClientsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── Counter Animation ────────────────────────────── */
function animateCounters() {
    document.querySelectorAll('.kpi-value[data-count]').forEach(function(el) {
        var target = parseInt(el.dataset.count) || 0;
        var suffix = el.dataset.suffix || '';
        var duration = 1200;
        var start = performance.now();

        function step(now) {
            var elapsed = now - start;
            var progress = Math.min(elapsed / duration, 1);
            // Ease out cubic
            var eased = 1 - Math.pow(1 - progress, 3);
            var current = Math.round(target * eased);
            el.textContent = current.toLocaleString('fr-FR') + suffix;
            if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    });
}
// Start counters after a short delay for visual impact
setTimeout(animateCounters, 300);

/* ── Chart.js Global Defaults ─────────────────────── */
Chart.defaults.font.family = "'Plus Jakarta Sans', sans-serif";
Chart.defaults.font.size = 11;
Chart.defaults.color = '#6B7A90';

const COLORS = [
    '#0C7B93','#10B981','#F59E0B','#EF4444','#8B5CF6',
    '#EC4899','#14B8A6','#F97316','#064E5C','#6366F1'
];

/* ── Chart 1: Stock par marque ────────────────────── */
let stockChart;
async function loadStockParMarque() {
    const marque = document.getElementById('marqueFilter').value;
    const r = await fetch('/api/dashboard/stock-par-marque' + (marque ? '?marque=' + encodeURIComponent(marque) : ''));
    const d = await r.json();
    if (stockChart) stockChart.destroy();
    stockChart = new Chart(document.getElementById('stockMarqueChart'), {
        type: 'bar',
        data: {
            labels: d.labels,
            datasets: [{
                label: 'Unit\u00e9s en stock',
                data: d.data,
                backgroundColor: COLORS.slice(0, d.data.length).map(c => c + '20'),
                borderColor: COLORS.slice(0, d.data.length),
                borderWidth: 2,
                borderRadius: 8,
                borderSkipped: false,
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, grid: { color: '#EFF2F5', drawBorder: false }, ticks: { padding: 8 } },
                x: { grid: { display: false }, ticks: { font: { size: 10 } } }
            }
        }
    });
}

/* ── Chart 2: Sales Evolution ─────────────────────── */
let evoChart;
async function loadEvolution() {
    const r = await fetch('/api/dashboard/evolution-ventes');
    const d = await r.json();
    if (evoChart) evoChart.destroy();

    const ctx = document.getElementById('evolutionChart').getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 260);
    gradient.addColorStop(0, 'rgba(12, 123, 147, 0.15)');
    gradient.addColorStop(1, 'rgba(12, 123, 147, 0.01)');

    evoChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: d.labels,
            datasets: [{
                label: 'CA mensuel (dh TTC)',
                data: d.data,
                borderColor: '#0C7B93',
                backgroundColor: gradient,
                borderWidth: 2.5,
                pointRadius: 4,
                pointBackgroundColor: '#fff',
                pointBorderColor: '#0C7B93',
                pointBorderWidth: 2,
                pointHoverRadius: 7,
                pointHoverBackgroundColor: '#0C7B93',
                fill: true,
                tension: 0.4,
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { beginAtZero: true, grid: { color: '#EFF2F5', drawBorder: false },
                     ticks: { padding: 8, callback: v => v.toLocaleString('fr-FR') + ' dh' } },
                x: { grid: { display: false }, ticks: { font: { size: 10 } } }
            },
            interaction: { intersect: false, mode: 'index' },
        }
    });
}

/* ── Chart 3: Top sales ───────────────────────────── */
let topVentesChart;
async function loadTopVentes(periode) {
    document.getElementById('btnMois').className  = periode === 'mois'  ? 'btn btn-info text-white' : 'btn btn-outline-info';
    document.getElementById('btnAnnee').className = periode === 'annee' ? 'btn btn-info text-white' : 'btn btn-outline-info';
    document.getElementById('btnMois').style.cssText  += 'border-radius:var(--radius-full) 0 0 var(--radius-full); font-size:0.75rem;';
    document.getElementById('btnAnnee').style.cssText += 'border-radius:0 var(--radius-full) var(--radius-full) 0; font-size:0.75rem;';
    const r = await fetch('/api/dashboard/top-ventes?periode=' + periode);
    const d = await r.json();
    const labels = d.labels.map(l => l.length > 30 ? l.substring(0,30) + '\u2026' : l);
    if (topVentesChart) topVentesChart.destroy();
    topVentesChart = new Chart(document.getElementById('topVentesChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Quantit\u00e9 vendue',
                data: d.data,
                backgroundColor: '#10B98130',
                borderColor: '#10B981',
                borderWidth: 2,
                borderRadius: 8,
                borderSkipped: false,
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { beginAtZero: true, grid: { color: '#EFF2F5', drawBorder: false }, ticks: { padding: 8 } },
                y: { grid: { display: false }, ticks: { font: { size: 10 } } }
            }
        }
    });
}

/* ── Chart 4: Top clients ─────────────────────────── */
let topClientsChart;
async function loadTopClients() {
    const r = await fetch('/api/dashboard/top-clients');
    const d = await r.json();
    if (topClientsChart) topClientsChart.destroy();
    if (!d.labels.length) {
        document.getElementById('topClientsChart').parentElement.innerHTML =
            '<div class="empty-state"><i class="fas fa-chart-pie"></i><p>Aucune donn\u00e9e</p></div>';
        return;
    }
    topClientsChart = new Chart(document.getElementById('topClientsChart'), {
        type: 'doughnut',
        data: {
            labels: d.labels,
            datasets: [{
                data: d.data,
                backgroundColor: COLORS.slice(0, d.data.length),
                borderWidth: 3,
                borderColor: '#fff',
                hoverOffset: 6,
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            cutout: '65%',
            plugins: {
                legend: { position: 'right', labels: { font: { size: 11, family: "'Plus Jakarta Sans'" }, boxWidth: 12, padding: 12, usePointStyle: true, pointStyle: 'circle' } },
                tooltip: {
                    callbacks: {
                        label: ctx => ctx.label + ': ' + ctx.parsed.toLocaleString('fr-FR') + ' dh'
                    }
                }
            }
        }
    });
}

// Initialize
loadStockParMarque();
loadEvolution();
loadTopVentes('mois');
loadTopClients();
</script>
</body>
</html>
